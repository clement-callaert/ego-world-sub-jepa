# @package model
# Factorized Ego-World JEPA (ours): separate world (ViT) and ego (MLP) streams.
mode: factored
img_size: 64
in_chans: 3
proprio_dim: 4
action_dim: 2
# World encoder (small ViT, LeWM-style compact backbone).
patch_size: 8
embed_dim: 192
depth: 4
num_heads: 6
mlp_ratio: 2.0
world_dim: 192
# Projector head norm. "layernorm" normalizes each sample on its own, so the
# train and eval outputs are the same. "batchnorm" uses batch stats in train and
# running stats in eval, so its outputs differ between the two. State supervision plus SIGReg,
# the variance floor and the cov term already stop collapse, so we use layernorm.
world_head_norm: layernorm
# Ego encoder (lightweight MLP).
ego_dim: 32
ego_hidden: 128
ego_depth: 2
# Predictor.
action_emb_dim: 64
pred_hidden: 256
pred_depth: 2
# Losses (LeJEPA mix + small ego consistency aux).
sigreg_mix: 0.1
ego_loss_weight: 0.1
# Detach the target latent so the model cannot cheat by collapsing it (JEPA).
stop_grad_target: true
variance_weight: 0.5
variance_target: 0.5
# Extra decorrelation on z_world. Helps SIGReg keep the latent full rank.
# 0 turns it off. Value is a mean squared correlation, so it stays in [0, 1].
cov_weight: 0.25
# State supervision. A small linear head reads the block pose from z_world and
# the agent xy from z_ego and is trained on the true state. This forces the
# world latent to encode the block, which the planner needs. Set 0 for pure JEPA.
state_aux_weight: 1.0
block_slice: [2, 5]   # block pose columns [x, y, angle] in `state`
agent_slice: [0, 2]   # agent xy columns in `state`
sigreg_kwargs:
  n_directions: 256
  n_points: 17
  t_max: 5.0
