# @package model
# Monolithic LeWM-style baseline at 96x96. Same encoder capacity as
# factored_hires for a controlled planning comparison on pusht_96.lance.
mode: monolithic
img_size: 96
in_chans: 3
proprio_dim: 4
action_dim: 2
# World encoder (same capacity as factored_hires).
patch_size: 8
embed_dim: 256
depth: 6
num_heads: 8
mlp_ratio: 2.0
world_dim: 256
# LayerNorm avoids train/eval BatchNorm mismatch (see POSTMORTEM.md).
world_head_norm: layernorm
# ego_* are unused in monolithic mode (kept for config symmetry).
ego_dim: 32
ego_hidden: 128
ego_depth: 2
# Predictor.
action_emb_dim: 64
pred_hidden: 256
pred_depth: 2
# Losses.
sigreg_mix: 0.1
ego_loss_weight: 0.0
stop_grad_target: false
variance_weight: 0.5
variance_target: 0.5
cov_weight: 0.0
# State supervision. A linear head reads block pose from the single latent.
state_aux_weight: 1.0
block_slice: [2, 5]
agent_slice: [0, 2]
sigreg_kwargs:
  n_directions: 256
  n_points: 17
  t_max: 5.0
