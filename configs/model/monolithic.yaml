# @package model
# Monolithic LeWM-style baseline: a single entangled latent (pixels + proprio),
# same encoder/predictor capacity as the factored model, no ego/world split.
mode: monolithic
img_size: 64
in_chans: 3
proprio_dim: 4
action_dim: 2
patch_size: 8
embed_dim: 192
depth: 4
num_heads: 6
mlp_ratio: 2.0
world_dim: 192
# Projector-head normalization: "none" (SIGReg controls scale, avoids hiding
# low-rank collapse) or "batchnorm" (original LeWM head).
world_head_norm: none
# ego_* are unused in monolithic mode (kept for config symmetry).
ego_dim: 32
ego_hidden: 128
ego_depth: 2
action_emb_dim: 64
pred_hidden: 256
pred_depth: 2
sigreg_mix: 0.1
ego_loss_weight: 0.0
stop_grad_target: false
variance_weight: 0.5
variance_target: 0.5
cov_weight: 0.0
# State supervision (same idea as the factored config). A linear head reads the
# block pose from the single latent and is trained on the true state, so the
# latent encodes the block for planning. Set 0 for pure JEPA.
state_aux_weight: 1.0
block_slice: [2, 5]
agent_slice: [0, 2]
sigreg_kwargs:
  n_directions: 256
  n_points: 17
  t_max: 5.0
